<div class="min-h-screen bg-gray-50/50">
    <!-- Header de la página -->
    <header class="bg-white border-b border-gray-200">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-6">
            <div class="flex items-center justify-between">
                <div>
                    <h1 class="text-2xl font-bold text-gray-900 tracking-tight">Políticas de Negocio</h1>
                    <p class="mt-1 text-sm text-gray-500">Gestiona y diseña los diagramas de flujo de tu negocio.</p>
                </div>
                <button
                    (click)="openCreateModal()"
                    class="inline-flex items-center px-6 py-3 border border-transparent text-sm font-bold rounded-xl shadow-lg shadow-indigo-100 text-white bg-indigo-600 hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500 transition-all active:scale-95"
                >
                    <svg class="w-5 h-5 mr-2 -ml-1" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6v6m0 0v6m0-6h6m-6 0H6" />
                    </svg>
                    Crear Política
                </button>
            </div>
        </div>
    </header>

    <!-- Contenido principal -->
    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-10">
        <!-- Renderizar el componente de tabla -->
        <app-politica-table
            [politicas]="politicas()"
            (onEliminar)="handleEliminar($event)"
            (onGestionarColaboradores)="handleGestionarColaboradores($event)"
        ></app-politica-table>
    </main>

    <!-- Componente de Formulario (Modal) -->
    <app-politica-form
        [show]="showCreateModal()"
        (onClose)="showCreateModal.set(false)"
        (onSubmit)="handleCreate($event)"
    ></app-politica-form>
</div>
