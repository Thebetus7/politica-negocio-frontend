<div class="space-y-6">
  <div class="flex justify-between items-center">
    <div>
      <h2 class="text-2xl font-bold text-gray-900 dark:text-white">Políticas de Negocio</h2>
      <p class="mt-1 text-sm text-gray-500 dark:text-gray-400">Gestiona y diseña los diagramas de flujo de tu negocio.</p>
    </div>
    <button
      (click)="openCreateModal()"
      class="inline-flex items-center px-4 py-2 border border-transparent text-sm font-medium rounded-md shadow-sm text-white bg-indigo-600 hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500 transition-colors">
      Crear Política
    </button>
  </div>

  <app-politica-table
    [politicas]="politicas()"
    (onEliminar)="handleEliminar($event)"
    (onVer)="handleVer($event)"
  />

  <app-politica-form
    [show]="showCreateModal()"
    (onClose)="showCreateModal.set(false)"
    (onSubmit)="handleCreate($event)"
  />
</div>
